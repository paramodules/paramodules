name: Publish

on:
    release:
        types: [published]

concurrency:
    group: "publish"
    cancel-in-progress: false

jobs:
    gate:
        runs-on: ubuntu-latest
        if: contains(github.event.release.tag_name, 'docs') == false
        steps:
            - name: Gate check
              run: echo "Publish condition met"

    test:
        needs: gate
        uses: ./.github/workflows/test.yml

    build-pkg:
        needs: gate
        uses: ./.github/workflows/build-pkg.yml

    validate-tag:
        needs: gate
        uses: ./.github/workflows/validate-tag.yml

    publish-pkg:
        needs: [test, build-pkg, validate-tag]
        if: contains(github.event.release.tag_name, 'docs') == false
        environment:
            name: npm-publish
            url: https://www.npmjs.com/package/paramodules
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required for checkout
            id-token: write # Required for OIDC with npm
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "lts/*"
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

            - name: Download paramodules build artifacts
              uses: actions/download-artifact@v5
              with:
                  name: "paramodules-build"
                  path: ./packages/paramodules/dist

            - name: Download @paramodules/react build artifacts
              uses: actions/download-artifact@v5
              with:
                  name: "@paramodules/react-build"
                  path: ./packages/@paramodules/react/main/dist

            - name: Set version from release tag
              run: |
                  VERSION=${GITHUB_REF#refs/tags/}
                  VERSION=${VERSION#v}
                  echo "Setting version to: $VERSION"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Set version for paramodules
              working-directory: ./packages/paramodules
              run: |
                  npm version $VERSION --no-git-tag-version
                  echo "paramodules package.json version is now: $(cat package.json | jq -r .version)"

            - name: Set version for @paramodules/react
              working-directory: ./packages/@marketjs/react/main
              run: |
                  npm version $VERSION --no-git-tag-version
                  echo "@paramodules/react package.json version is now: $(cat package.json | jq -r .version)"

            - name: Install dependencies to resolve workspace:^
              working-directory: .
              run: pnpm install

            - name: Dry publish paramodules
              if: contains(github.event.release.tag_name, 'dry')
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag dry --dry-run --no-git-checks

            - name: Dry publish @paramodules/react
              if: contains(github.event.release.tag_name, 'dry')
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag dry --dry-run --no-git-checks

            - name: Publish paramodules to Canary
              if: contains(github.event.release.tag_name, 'canary')
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag canary --no-git-checks

            - name: Publish @paramodules/react to Canary
              if: contains(github.event.release.tag_name, 'canary')
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag canary --no-git-checks

            - name: Publish paramodules to Alpha
              if: contains(github.event.release.tag_name, 'alpha')
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag alpha --no-git-checks

            - name: Publish @paramodules/react to Alpha
              if: contains(github.event.release.tag_name, 'alpha')
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag alpha --no-git-checks

            - name: Publish paramodules to Beta
              if: contains(github.event.release.tag_name, 'beta')
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag beta --no-git-checks

            - name: Publish @paramodules/react to Beta
              if: contains(github.event.release.tag_name, 'beta')
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag beta --no-git-checks

            - name: Publish paramodules to RC
              if: contains(github.event.release.tag_name, 'rc')
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag rc --no-git-checks

            - name: Publish @paramodules/react to RC
              if: contains(github.event.release.tag_name, 'rc')
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag rc --no-git-checks

            - name: Publish paramodules to Latest
              if: contains(github.event.release.tag_name, '-') == false
              working-directory: ./packages/paramodules
              run: |
                  pnpm publish --tag latest --no-git-checks

            - name: Publish @paramodules/react to Latest
              if: contains(github.event.release.tag_name, '-') == false
              working-directory: ./packages/@paramodules/react/main
              run: |
                  pnpm publish --tag latest --no-git-checks
