name: Publish

on:
    release:
        types: [published]

concurrency:
    group: "publish"
    cancel-in-progress: false

jobs:
    gate:
        runs-on: ubuntu-latest
        if: contains(github.event.release.tag_name, 'docs') == false
        steps:
            - name: Gate check
              run: echo "Publish condition met"

    test:
        needs: gate
        uses: ./.github/workflows/test.yml

    build-pkg:
        needs: gate
        uses: ./.github/workflows/build-pkg.yml

    validate-tag:
        needs: gate
        uses: ./.github/workflows/validate-tag.yml

    publish-pkg:
        needs: [test, build-pkg, validate-tag]
        if: contains(github.event.release.tag_name, 'docs') == false
        environment:
            name: npm-publish
            url: https://www.npmjs.com/package/@marketjs/trademarks
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required for checkout
            id-token: write # Required for OIDC with npm
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "lts/*"
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

            - name: Download @marketjs/trademarks build artifacts
              uses: actions/download-artifact@v5
              with:
                  name: "@marketjs/trademarks-build"
                  path: ./packages/@marketjs/trademarks/dist

            - name: Download @marketjs/react build artifacts
              uses: actions/download-artifact@v5
              with:
                  name: "@marketjs/react-build"
                  path: ./packages/@marketjs/react/main/dist

            - name: Set version from release tag
              run: |
                  VERSION=${GITHUB_REF#refs/tags/}
                  VERSION=${VERSION#v}
                  echo "Setting version to: $VERSION"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

            - name: Set version for @marketjs/trademarks
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  npm version $VERSION --no-git-tag-version
                  echo "@marketjs/trademarks package.json version is now: $(cat package.json | jq -r .version)"

            - name: Set version for @marketjs/react
              working-directory: ./packages/@marketjs/react/main
              run: |
                  npm version $VERSION --no-git-tag-version
                  echo "@marketjs/react package.json version is now: $(cat package.json | jq -r .version)"

            - name: Install dependencies to resolve workspace:^
              working-directory: .
              run: pnpm install

            - name: Dry publish @marketjs/trademarks
              if: contains(github.event.release.tag_name, 'dry')
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag dry --dry-run --no-git-checks

            - name: Dry publish @marketjs/react
              if: contains(github.event.release.tag_name, 'dry')
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag dry --dry-run --no-git-checks

            - name: Publish @marketjs/trademarks to Canary
              if: contains(github.event.release.tag_name, 'canary')
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag canary --no-git-checks

            - name: Publish @marketjs/react to Canary
              if: contains(github.event.release.tag_name, 'canary')
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag canary --no-git-checks

            - name: Publish @marketjs/trademarks to Alpha
              if: contains(github.event.release.tag_name, 'alpha')
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag alpha --no-git-checks

            - name: Publish @marketjs/react to Alpha
              if: contains(github.event.release.tag_name, 'alpha')
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag alpha --no-git-checks

            - name: Publish @marketjs/trademarks to Beta
              if: contains(github.event.release.tag_name, 'beta')
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag beta --no-git-checks

            - name: Publish @marketjs/react to Beta
              if: contains(github.event.release.tag_name, 'beta')
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag beta --no-git-checks

            - name: Publish @marketjs/trademarks to RC
              if: contains(github.event.release.tag_name, 'rc')
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag rc --no-git-checks

            - name: Publish @marketjs/react to RC
              if: contains(github.event.release.tag_name, 'rc')
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag rc --no-git-checks

            - name: Publish @marketjs/trademarks to Latest
              if: contains(github.event.release.tag_name, '-') == false
              working-directory: ./packages/@marketjs/trademarks
              run: |
                  pnpm publish --tag latest --no-git-checks

            - name: Publish @marketjs/react to Latest
              if: contains(github.event.release.tag_name, '-') == false
              working-directory: ./packages/@marketjs/react/main
              run: |
                  pnpm publish --tag latest --no-git-checks
