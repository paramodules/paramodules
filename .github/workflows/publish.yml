name: Publish

on:
    release:
        types: [published]

concurrency:
    group: "publish"
    cancel-in-progress: false

jobs:
    validate-tag:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: ./.github/actions/validate-tag

    resolve-tag:
        needs: validate-tag
        runs-on: ubuntu-latest
        outputs:
            tag_name: ${{ steps.resolve.outputs.tag_name }}
            channel: ${{ steps.resolve.outputs.channel }}
        steps:
            - name: Resolve tag and channel
              id: resolve
              run: |
                  TAG="${{ github.event.release.tag_name }}"
                  echo "tag_name=$TAG" >> $GITHUB_OUTPUT

                  if [[ "$TAG" == *"dry"* ]]; then       CHANNEL="dry"
                  elif [[ "$TAG" == *"canary"* ]]; then  CHANNEL="canary"
                  elif [[ "$TAG" == *"alpha"* ]]; then   CHANNEL="alpha"
                  elif [[ "$TAG" == *"beta"* ]]; then    CHANNEL="beta"
                  elif [[ "$TAG" == *"rc"* ]]; then      CHANNEL="rc"
                  elif [[ "$TAG" != *"-"* ]]; then       CHANNEL="latest"
                  else
                    echo "::error::Unknown tag pattern: $TAG — no publish channel matched. Aborting."
                    exit 1
                  fi

                  echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
                  echo "Resolved channel: $CHANNEL"

    gate:
        needs: resolve-tag
        runs-on: ubuntu-latest
        if: contains(needs.resolve-tag.outputs.tag_name, 'docs') == false
        steps:
            - name: Gate check
              run: echo "Publish condition met for tag ${{ needs.resolve-tag.outputs.tag_name }} on channel ${{ needs.resolve-tag.outputs.channel }}"

    test:
        needs: gate
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v5
            - uses: ./.github/actions/setup
            - uses: ./.github/actions/test

    build-pkg:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                include:
                    - filter: paramodules
                      dist_path: packages/@paramodules/core/dist
                      artifact_name: paramodules-build

                    - filter: "@paramodules/react"
                      dist_path: packages/@paramodules/react/main/dist
                      artifact_name: "@paramodules-react-build"

        steps:
            - uses: actions/checkout@v5
            - uses: ./.github/actions/setup
            - uses: ./.github/actions/build-pkg
              with:
                  filter: ${{ matrix.filter }}
                  dist_path: ${{ matrix.dist_path }}
                  artifact_name: ${{ matrix.artifact_name }}
                  upload_artifact: "true"

    publish-pkg:
        needs: [resolve-tag, build-pkg]
        if: contains(needs.resolve-tag.outputs.tag_name, 'docs') == false
        environment:
            name: npm-publish
            url: https://www.npmjs.com/package/paramodules
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required for checkout
            id-token: write # Required for OIDC with npm
        strategy:
            matrix:
                include:
                    - package: paramodules
                      artifact_name: "paramodules-build"
                      artifact_path: packages/@paramodules/core/dist
                      working_directory: packages/@paramodules/core

                    - package: "@paramodules/react"
                      artifact_name: "@paramodules-react-build"
                      artifact_path: packages/@paramodules/react/main/dist
                      working_directory: packages/@paramodules/react/main

        steps:
            - uses: actions/checkout@v5

            - uses: ./.github/actions/setup
              with:
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false # intentional: avoid stale cache on publish

            - name: Download ${{ matrix.package }} build artifacts
              uses: actions/download-artifact@v5
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}

            - name: Set workspace package versions
              run: |
                  VERSION="${{ needs.resolve-tag.outputs.tag_name }}"
                  VERSION="${VERSION#v}"
                  echo "Setting version to: $VERSION"

                  pnpm \
                      --filter paramodules \
                      --filter "@paramodules/react" \
                      exec npm version "$VERSION" --no-git-tag-version

            - name: Publish ${{ matrix.package }}
              working-directory: ${{ matrix.working_directory }}
              env:
                  CHANNEL: ${{ needs.resolve-tag.outputs.channel }}
              run: |
                  FLAGS="--tag $CHANNEL --no-git-checks --provenance"
                  [[ "$CHANNEL" == "dry" ]] && FLAGS="$FLAGS --dry-run"
                  echo "Publishing ${{ matrix.package }} with: pnpm publish $FLAGS"
                  pnpm publish $FLAGS
