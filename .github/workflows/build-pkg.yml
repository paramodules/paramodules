name: Build Pkg

on:
    workflow_call:

jobs:
    build-pkg:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "lts/*"

            - name: Install dependencies
              run: pnpm install

            - name: Build packages
              run: |
                  pnpm run build --filter=@marketjs/trademarks
                  pnpm run build --filter=@marketjs/react

            - name: Upload @marketjs/trademarks build artifacts
              if: ${{ github.event_name == 'release' }}
              uses: actions/upload-artifact@v4
              with:
                  name: "@marketjs/trademarks-build"
                  path: |
                      packages/@marketjs/trademarks/dist

            - name: Upload @marketjs/react build artifacts
              if: ${{ github.event_name == 'release' }}
              uses: actions/upload-artifact@v4
              with:
                  name: "@marketjs/react-build"
                  path: |
                      packages/@marketjs/react/main/dist
